<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donor Login - FeedForward Nova Scotia</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <header class="login-header donor-header">
    <img src="logo.png" alt="FeedForward Nova Scotia logo" class="login-logo">
    <div>
      <h1>Donor Portal</h1>
      <p>Sign in or create an account to share surplus food.</p>
    </div>
  </header>

  <main class="login-page">
    <section class="form-card">
      <h2>Login</h2>
      <p class="form-note">Already have an account? Log in to start donating.</p>

      <form class="login-form" id="donor-login-form">
        <label for="donor-email">Email or Mobile Number</label>
        <input type="email" id="donor-email" name="email" placeholder="Email or mobile number" required>

        <label for="donor-password">Password</label>
        <input type="password" id="donor-password" name="password" placeholder="Password" required>

        <button type="submit" class="button donor-button">Login</button>
        <button type="button" class="button donor-button"
  onclick="alert('Our organization will contact you to reset your password.')">
  Forgot Password?
</button>
      </form>

      <p class="back-link"><a href="index.html">Back to Home</a></p>
    </section>

    <section class="form-card">
      <h2>Create Donor Account</h2>
      <p class="form-note">New here? Create an account to join the community.</p>
      <form id="donor-signup-form">
        <label for="donor-name">Organization Name</label>
        <input type="text" id="donor-name" name="donor-name" placeholder="Downtown Cafe" required>

        <label for="donor-contact">Primary Contact</label>
        <input type="text" id="donor-contact" name="donor-contact" placeholder="Manager name" required>

        <label for="donor-signup-email">Email</label>
        <input type="email" id="donor-signup-email" name="signup-email" placeholder="donor@example.com" required>

        <label for="donor-phone">Phone</label>
        <input type="tel" id="donor-phone" name="phone" placeholder="902-555-1234" required>

        <label for="donor-address">Address</label>
        <input type="text" id="donor-address" name="address" placeholder="123 Main St, Halifax" required>

        <label for="donor-new-password">Password</label>
        <input type="password" id="donor-new-password" name="new-password" minlength="6" required>

        <label for="donor-confirm-password">Confirm Password</label>
        <input type="password" id="donor-confirm-password" name="confirm-password" minlength="6" required>

        <button type="submit" class="button donor-button">Create Account</button>
      </form>
    </section>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
